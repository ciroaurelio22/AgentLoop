<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="boot-loading">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-head-row">
            <h2 class="sidebar-title">Tasks</h2>
            <span class="sidebar-live">live</span>
          </div>
          <button type="button" id="btn-sidebar-new" class="btn btn--sidebar-new">+ New task</button>
        </div>
        <div id="task-list" class="task-list"></div>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="topbar-left">
            <h1 class="app-title">Agent Console</h1>
          </div>
          <div class="topbar-workspace">
            <input
              id="repo-path"
              type="text"
              class="input input--path"
              placeholder="Workspace path…"
              spellcheck="false"
              aria-label="Workspace path"
              autocomplete="off"
            />
            <button type="button" id="btn-set-repo" class="btn btn--secondary" title="Apply workspace path">Apply</button>
          </div>
        </header>

        <section class="controls" aria-label="Task composer">
          <div class="controls-id" id="task-id" aria-label="Task ID">TASK-001</div>
          <input
            id="task-title"
            type="text"
            class="input input--title"
            placeholder="Task title — describe what to do"
            aria-label="Task title"
            autocomplete="off"
          />
          <div class="controls-actions">
            <button
              type="button"
              id="btn-create"
              class="btn btn--primary"
              title="Load task template into Program (preview, not saved)"
            >
              Create
            </button>
            <div class="menu">
              <button type="button" id="btn-more" class="btn btn--secondary btn--icon" title="More actions" aria-haspopup="menu" aria-expanded="false">···</button>
              <div id="more-menu" class="menu-panel hidden" role="menu">
                <button type="button" role="menuitem" data-action="draft-ai">Complete with AI</button>
                <button type="button" role="menuitem" data-action="reload">Reload file</button>
                <hr />
                <button type="button" role="menuitem" data-action="new-id">New task</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel--program">
          <div class="panel-head">
            <div class="panel-head-left">
              <h2 class="panel-title">Program</h2>
              <div class="panel-meta">
                <span id="program-file">—</span>
                <span id="program-sync" class="sync-badge" data-state="idle">sync</span>
              </div>
            </div>
            <div class="panel-head-actions">
              <button
                type="button"
                id="btn-save"
                class="btn btn--secondary btn--sm"
                title="Save program to disk"
              >
                Save
              </button>
              <button
                type="button"
                id="btn-verify"
                class="btn btn--secondary btn--sm"
                title="Run acceptance criteria check"
              >
                Verify
              </button>
            </div>
          </div>
          <div class="program-body">
            <textarea
              id="program-editor"
              class="program-editor"
              spellcheck="false"
              placeholder="Program content will appear here…"
            ></textarea>
            <button
              type="button"
              id="btn-program-ai"
              class="btn btn--ai btn--program-ai"
              title="Create task on disk and start AI agent"
              aria-label="Start AI agent"
            >
              Run AI
            </button>
          </div>
        </section>

        <footer class="bottombar">
          <div class="agent-settings">
            <label class="agent-settings-field">
              <span class="agent-settings-label">Provider</span>
              <select id="agent-backend" class="input input--compact" disabled>
                <option value="cursor">Cursor</option>
                <option value="claude">Claude</option>
                <option value="codex">Codex</option>
              </select>
            </label>
            <label class="agent-settings-field agent-settings-field--model">
              <span class="agent-settings-label">Model</span>
              <select id="agent-model" class="input input--compact input--model" disabled>
                <option value="">Loading models…</option>
              </select>
            </label>
          </div>
        </footer>
      </div>

      <aside class="rail rail--activity" aria-label="Activity">
        <section class="panel panel--activity">
          <div class="panel-head">
            <h2 class="panel-title">Activity</h2>
            <span class="panel-hint">Recent actions</span>
          </div>
          <div id="activity-feed" class="activity-feed">
            <div class="activity-empty">No activity yet</div>
          </div>
        </section>
      </aside>
    </div>

    <div id="setup-gate" class="setup-gate hidden" role="dialog" aria-modal="true" aria-labelledby="setup-gate-title">
      <div class="setup-gate-card">
        <h2 id="setup-gate-title">Setup required</h2>
        <p class="setup-gate-lead">
          Complete the required steps below before using Agent Console.
        </p>
        <ul id="setup-checklist" class="setup-checklist"></ul>
        <div id="setup-workspace" class="setup-workspace hidden">
          <label class="setup-workspace-label" for="setup-repo-path">Workspace path</label>
          <div class="setup-workspace-row">
            <input
              id="setup-repo-path"
              type="text"
              class="input input--path"
              placeholder="D:\path\to\your-repo"
              spellcheck="false"
            />
            <button type="button" id="btn-setup-apply" class="btn btn--secondary">Apply</button>
          </div>
        </div>
        <div class="setup-gate-actions">
          <button type="button" id="btn-setup-recheck" class="btn btn--secondary">Re-check</button>
          <button type="button" id="btn-enable-autostart" class="btn btn--ai btn--gate hidden">
            Enable autostart
          </button>
        </div>
      </div>
    </div>

    <dialog id="desc-dialog" class="modal modal--request">
      <form method="dialog" id="desc-form">
        <h2 id="desc-heading">AI request</h2>
        <p id="desc-subtitle" class="modal-sub"></p>
        <textarea
          id="desc-text"
          class="modal-textarea"
          rows="8"
          placeholder="Describe what the agent should do…"
          required
          minlength="20"
        ></textarea>
        <p class="modal-hint">Min. 20 characters · Ctrl+Enter to confirm</p>
        <div class="modal-actions">
          <button type="button" id="desc-cancel" class="btn btn--secondary">Cancel</button>
          <button type="submit" id="desc-submit" class="btn btn--ai">Start agent</button>
        </div>
      </form>
    </dialog>

    <div
      id="boot-overlay"
      class="boot-overlay"
      role="alertdialog"
      aria-modal="true"
      aria-busy="true"
      aria-labelledby="boot-message"
    >
      <div class="boot-overlay-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <p id="boot-message" class="boot-message">Avvio Agent Console…</p>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
